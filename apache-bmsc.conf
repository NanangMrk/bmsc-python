# Apache 2.4 VirtualHost Configuration for BMSC
# Replace domain-saya.com with your actual production domain name.

<VirtualHost *:80>
    ServerName domain-saya.com
    ServerAlias www.domain-saya.com
    DocumentRoot /var/www/bmsc/dist

    # Enable HTTP Reverse Proxy Modules:
    # sudo a2enmod proxy proxy_http rewrite headers

    # 1. Uploads Alias
    Alias /uploads /var/www/bmsc/backend/uploads
    <Directory "/var/www/bmsc/backend/uploads">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # 2. Frontend Directory & SPA Fallback
    <Directory "/var/www/bmsc/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA Routing: Redirect non-file/directory requests to index.html
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !^/api/
            RewriteCond %{REQUEST_URI} !^/uploads/
            RewriteRule . /index.html [L]
        </IfModule>
    </Directory>

    # 3. Backend API Reverse Proxy (/api -> Node.js Express at port 3000)
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3000/api
    ProxyPassReverse /api http://127.0.0.1:3000/api

    # Socket.io Websocket Proxying
    ProxyPass /socket.io ws://127.0.0.1:3000/socket.io
    ProxyPassReverse /socket.io ws://127.0.0.1:3000/socket.io

    ErrorLog ${APACHE_LOG_DIR}/bmsc_error.log
    CustomLog ${APACHE_LOG_DIR}/bmsc_access.log combined
</VirtualHost>
